services:
  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend:8000
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend

  backend:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    command: sh -c "pip install -r requirements.txt -q && uvicorn main:app --host 0.0.0.0 --reload"
