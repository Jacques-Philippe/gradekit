repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
  - repo: local
    hooks:
      - id: eslint
        name: Frontend lint
        entry: bash -c "cd frontend && npm run lint"
        language: system
        pass_filenames: false
        files: ^frontend/

      - id: prettier
        name: Frontend format
        entry: bash -c "cd frontend && npm run format"
        language: system
        pass_filenames: false
        files: ^frontend/

      - id: ruff-check
        name: Python lint (ruff)
        entry: ruff check .
        language: system
        pass_filenames: false
        files: ^backend/

      - id: ruff-format
        name: Python format (ruff)
        entry: ruff format .
        language: system
        pass_filenames: false
        files: ^backend/
